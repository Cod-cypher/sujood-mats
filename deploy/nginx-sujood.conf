# Nginx server block for Sujood (frontend + API served by Express on 127.0.0.1:3001).
# Install to /etc/nginx/sites-available/sujoodmats.conf and symlink into sites-enabled.
# Run certbot afterwards to add HTTPS — it edits this file and adds the 443 server
# block + HTTP->HTTPS redirect automatically.

server {
    listen 80;
    listen [::]:80;
    server_name sujoodmats.com www.sujoodmats.com;

    # Allow reasonably sized request bodies (checkout payloads are tiny; bump if needed).
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Pass real client info through to Express (app has "trust proxy" enabled,
        # so req.ip / X-Forwarded-For resolve to the actual visitor).
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket/upgrade support (harmless if unused).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
    }
}
